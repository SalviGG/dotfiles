;==========================================================

[bar/main]
width = 100%
height = 20
offset-x = 2%
offset-y = 2%
bottom = false
fixed-center = false
line-size = 2

background = ${color.bg}
foreground = ${color.fg}

;==========================================================

font-0 = "Fantasque Sans Mono:pixelsize=10;3"
font-1 = "Iosevka Nerd Font:pixelsize=13;3"

;==========================================================

;cursor-click = pointer
;cursor-scroll = ns-resize

scroll-up = i3wm-wsnext
scroll-down = i3wm-wsprev

;== Module Location ========================================================

modules-left = arch left1 workspaces left2 intelliJ code android github reddit youtube
modules-right =  right1 pkg right2 volume right3  network  right4 date right5 powermenu
 
;== Modules ========================================================

[module/arch]
type = custom/text
content = ÔĆí
;alt icons = ÔĒļÔźĘÔÄā
content-padding = 2
content-background = ${color.shade1}
content-foreground = ${color.fg}
click-left = ~/.config/polybar/scripts/rmenu_1
click-right = ~/.config/polybar/scripts/rmenu_wi_1

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true
enable-scroll = true
format-padding = 1

